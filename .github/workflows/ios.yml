      #   if: github.ref == 'refs/heads/main'
      #   run: |
      #     xcodebuild archive \
      #         -project WoundMeasurementApp.xcodeproj \
      #         -scheme WoundMeasurementApp \
      #         -archivePath build/WoundAI.xcarchive \
      #         CODE_SIGN_IDENTITY="Apple Distribution: ..." \
      #         PROVISIONING_PROFILE_SPECIFIER="..."
