name: integrity-gate
on: [push, pull_request]
jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install numpy onnxruntime pillow pyyaml jsonschema flask opencv-python-headless fastapi 'httpx<0.28' python-multipart
      - name: Phase 0 workflow simulation (must be 10/10)
        run: python engineering/phase0/workflow_sim.py
      - name: Phase 0 preprocess consistency
        run: python engineering/phase0/preprocess_consistency.py
      - name: Phase 1 rules & annotation tests
        run: python engineering/phase1/test_phase1.py
      - name: Phase 1 clinical rules boundary tests (30)
        run: python engineering/phase1/test_clinical_rules.py
      - name: Phase 0 eval_harness seg_metrics tests
        run: python engineering/phase0/test_eval_harness.py
      - name: Phase 2 seg inference graceful-degrade tests
        run: python engineering/phase2/test_phase2.py
      - name: Phase 2 routing + flywheel tests (A3/A4)
        run: python engineering/phase2/test_phase2_pipeline.py
      - name: Phase 2 Track B explainable classifier tests
        run: python engineering/phase2/test_wound_classifier.py
      - name: Phase 2 calibration (sticker px/mm) tests
        run: python engineering/phase2/test_calibration.py
      - name: Phase 2 perspective(homography) area tests
        run: python engineering/phase2/test_geometry.py
      - name: Phase 2 unified measure + phantom area-error tests
        run: python engineering/phase2/test_measure.py
      - name: iOS Swift DTO <-> OpenAPI contract
        run: python engineering/phase2/verify_ios_contract.py
      - name: Phase 2 FastAPI service + auth integration
        run: python engineering/phase2/test_app_fastapi.py
      - name: Annotation workflow validation (flywheel correction_iou)
        run: python engineering/phase2/test_annotation_workflow.py
      - name: OpenAPI YAML parses
        run: python -c "import yaml;yaml.safe_load(open('openapi/annotation_segmentation.yaml',encoding='utf-8'));print('openapi OK')"
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Phase 2 reference API service (OpenAPI schema-validated)
        run: python engineering/phase2/test_api_service.py
      - name: Phase 2 Flask service integration test
        run: python engineering/phase2/test_app.py
      - name: Phase 1 annotation metrics (JS<->Py consistency)
        run: |
          python engineering/phase1/ui/gen_expected.py
          node engineering/phase1/ui/annot_metrics.test.js
