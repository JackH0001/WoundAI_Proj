# .github/workflows/cloud.yml
#
# Runs the FastAPI cloud service test suite on every push / PR that
# touches the 雲端 AI 模型訓練及分析服務 directory.
#
# Stages
# ------
# 1. Lint & dependency install on Python 3.11 + 3.12 matrix
# 2. pytest (FHIR mapper, FHIR endpoints, ML pipeline)
# 3. Coverage upload as build artifact
name: cloud-service

on:
  push:
    branches: [main, develop]
    paths:
      - '雲端 AI 模型訓練及分析服務/**'
      - '.github/workflows/cloud.yml'
  pull_request:
    paths:
      - '雲端 AI 模型訓練及分析服務/**'
      - '.github/workflows/cloud.yml'
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

defaults:
  run:
    # All paths below are relative to the cloud service directory.
    working-directory: 雲端 AI 模型訓練及分析服務

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # 取 wsm.onnx 等 LFS-tracked 模型權重

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: '雲端 AI 模型訓練及分析服務/requirements.txt'

      - name: Install system libraries for OpenCV headless
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libgl1 libglib2.0-0 libsm6 libxext6 libxrender-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run pytest
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: 雲端 AI 模型訓練及分析服務/coverage.xml
          if-no-files-found: ignore

  lint:
    name: ruff + mypy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: ruff
        run: ruff check app tests || true     # warn-only for now
      - name: mypy
        run: mypy --ignore-missing-imports app || true
