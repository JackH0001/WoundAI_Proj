# .github/workflows/android.yml
#
# Builds and unit-tests the Android client using Gradle.
# Instrumentation tests (androidTest) require an emulator so they are
# wired behind a separate job that only runs on the main branch.
name: android-client

on:
  push:
    branches: [main, develop]
    paths:
      - 'Android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'Android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  unit-test:
    name: assemble + unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle assembleDebug
        run: gradle assembleDebug --no-daemon

      - name: Gradle test
        run: gradle testDebugUnitTest --no-daemon

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: Android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: Android/app/build/reports/tests/**
          if-no-files-found: warn

  instrumentation-test:
    name: androidTest (emulator)
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45
    defaults:
      run:
        working-directory: Android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api29

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_5
          working-directory: Android
          script: gradle connectedDebugAndroidTest --no-daemon
